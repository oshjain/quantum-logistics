<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)" stroke="url(#glow)" stroke-width="2"/>

  <!-- Quantum orbit rings -->
  <ellipse cx="64" cy="64" rx="44" ry="16" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.3" transform="rotate(-20 64 64)"/>
  <ellipse cx="64" cy="64" rx="44" ry="16" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" transform="rotate(40 64 64)"/>
  <ellipse cx="64" cy="64" rx="44" ry="16" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" transform="rotate(100 64 64)"/>

  <!-- Central quantum dot / nucleus -->
  <circle cx="64" cy="64" r="10" fill="#22d3ee" opacity="0.9"/>

  <!-- Q letter on top -->
  <text x="64" y="72" text-anchor="middle" font-family="'Space Grotesk', 'Geist', 'Inter', sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="-1">Q</text>

  <!-- Small accent dots on orbits -->
  <circle cx="26" cy="56" r="3.5" fill="#22d3ee"/>
  <circle cx="102" cy="56" r="3.5" fill="#7c3aed"/>
  <circle cx="64" cy="108" r="3.5" fill="#f59e0b"/>
</svg>
